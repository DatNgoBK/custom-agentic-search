{
    "_comment_template": "OpenViking config wired to the custom Qdrant adapter. Secrets come from .env via the bootstrap script (scripts/lib/ov_config.py).",

    "storage": {
        "workspace": "./data",
        "vectordb": {
            "_comment_backend": "Dotted-path → factory.py:33-42 imports our class. The dot in 'backend' is what triggers dynamic loading.",
            "backend": "rag_qdrant.adapters.custom_qdrant_adapter.CustomQdrantCollectionAdapter",
            "name": "msb_report_2024",
            "project": "msb_demo",
            "index_name": "default",
            "distance_metric": "cosine",
            "dimension": 1536,
            "sparse_weight": 0.0,
            "qdrant": {
                "url": "${QDRANT_URL}",
                "api_key": "${QDRANT_API_KEY}",
                "timeout_seconds": 30,
                "dense_vector_name": "vector",
                "sparse_vector_name": "sparse_vector",
                "meta_collection_name": "__openviking_meta",
                "enable_text_index": true
            },
            "custom_params": {
                "url": "${QDRANT_URL}",
                "api_key": "${QDRANT_API_KEY}",
                "hnsw": {"m": 32, "ef_construct": 256, "full_scan_threshold": 10000},
                "quantization": {"enabled": true, "type": "int8", "always_ram": false},
                "indexing_threshold": 20000,
                "max_retries": 3,
                "breaker_fail_max": 5,
                "breaker_reset_seconds": 60
            }
        },
        "agfs": {
            "backend": "local"
        }
    },

    "embedding": {
        "dense": {
            "provider": "openai",
            "api_base": "${EMBED_BASE_URL}",
            "api_key": "${EMBED_API_KEY}",
            "model": "${EMBED_MODEL}",
            "dimension": 1536,
            "input": "text"
        },
        "text_source": "content_only",
        "max_input_tokens": 4096,
        "circuit_breaker": {"failure_threshold": 5, "reset_timeout": 60, "max_reset_timeout": 600}
    },

    "vlm": {
        "_comment": "VLM is required for image/L1 generation. Pointed at OpenRouter for take-home demo. For production, point this at a vision-capable endpoint.",
        "provider": "openai",
        "api_base": "https://openrouter.ai/api/v1",
        "api_key": "${EMBED_API_KEY}",
        "model": "openai/gpt-4o-mini",
        "temperature": 0.0,
        "max_retries": 2,
        "thinking": false
    },

    "rerank": {
        "_comment": "Cohere rerank-v3.5 via OpenRouter — multilingual cross-encoder that re-orders top-K hits for better Vietnamese precision. Routed through OpenRouter so we reuse the same EMBED_API_KEY (no separate Cohere account needed). Threshold filters low-relevance results.",
        "provider": "openai",
        "api_base": "https://openrouter.ai/api/v1/rerank",
        "api_key": "${EMBED_API_KEY}",
        "model": "cohere/rerank-v3.5",
        "threshold": 0.1
    },

    "auto_generate_l0": true,
    "auto_generate_l1": false,
    "output_language_override": "vi",
    "default_search_mode": "fast",
    "default_search_limit": 5,

    "log": {
        "level": "INFO",
        "format": "%(asctime)s - %(name)s - %(levelname)s - %(message)s",
        "output": "stdout"
    },

    "parsers": {
        "_comment": "We pre-processed the PDF with Marker offline; OpenViking only ingests markdown.",
        "pdf": {"strategy": "auto", "max_content_length": 100000, "max_section_size": 4000}
    }
}
